<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABST | 仮想空間をもっと楽しく</title>
  <meta name="description" content="ABSTは、仮想空間をもっと楽しくするために活動しています。">
  <link rel="canonical" href="https://abst.im/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="ABST | 仮想空間をもっと楽しく">
  <meta property="og:description" content="仮想空間をもっと楽しく。">
  <meta property="og:url" content="https://abst.im/">
  <meta property="og:image" content="https://abst.im/ogp.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#080809">
  <link rel="icon" type="image/svg+xml" href="abst.svg">
  <style>
    :root {
      --bg: #080809;
      --text: #f7f3ee;
      --muted: rgba(247, 243, 238, .54);
      --accent: #b05caf;
      --side: clamp(24px, 7vw, 104px);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100svh;
      background:
        radial-gradient(circle at 50% 42%, rgba(176, 92, 175, .2), transparent 38rem),
        radial-gradient(circle at 50% 58%, rgba(176, 92, 175, .09), transparent 52rem),
        radial-gradient(circle at 50% 78%, rgba(247, 243, 238, .045), transparent 30rem),
        linear-gradient(180deg, #100d12 0%, var(--bg) 56%, #050506 100%);
      color: var(--text);
      font-family: Inter, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: center;
      padding: clamp(28px, 6vw, 72px) var(--side);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(100%, 26rem);
      display: grid;
      justify-items: center;
      text-align: center;
    }

    .logo {
      width: clamp(58px, 6.5vw, 84px);
      height: auto;
      display: block;
      margin: 0 0 clamp(52px, 8vw, 96px);
    }

    .title {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.35rem, 2.9vw, 2.45rem);
      line-height: 1.28;
      font-weight: 400;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .title span {
      display: block;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px clamp(16px, 2.5vw, 28px);
      margin-top: clamp(54px, 8vw, 96px);
      color: var(--muted);
      font-size: .75rem;
      line-height: 1;
    }

    .links a {
      padding: 8px 0;
      transition: color .18s ease;
    }

    .links a:hover,
    .links a:focus-visible {
      color: var(--text);
      outline: none;
    }

    @media (max-width: 640px) {
      body {
        padding-block: 28px;
      }

      .logo {
        margin-bottom: 48px;
      }

      .title {
        font-size: clamp(1.35rem, 7vw, 1.85rem);
        line-height: 1.28;
      }

      .links {
        margin-top: 48px;
        font-size: .72rem;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-labelledby="page-title">
    <img class="logo" src="abst.svg" alt="" width="112" height="112">
    <h1 id="page-title" class="title">
      <span>仮想空間を</span>
      <span>もっと楽しく</span>
    </h1>

    <nav class="links" aria-label="External links">
      <a href="https://abst.booth.pm/" target="_blank" rel="noopener">BOOTH</a>
      <a href="https://vrchat.com/home/user/usr_6a8a6fe9-287f-4af5-b6a1-4c33c30c7c2b" target="_blank" rel="noopener">VRChat</a>
      <a href="https://x.com/KurisuSakamoto" target="_blank" rel="noopener">X</a>
      <a href="mailto:contact@abst.im">Contact</a>
    </nav>
  </main>
</body>
</html>
