<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABST</title>
  <meta name="description" content="ABSTは、仮想空間をもっと楽しくするためのプロダクトと制作をしています。">
  <link rel="canonical" href="https://abst.im/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="ABST">
  <meta property="og:description" content="仮想空間をもっと楽しくするためのプロダクトと制作。">
  <meta property="og:url" content="https://abst.im/">
  <meta property="og:image" content="https://abst.im/ogp.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="theme-color" content="#050506">
  <link rel="icon" type="image/svg+xml" href="abst.svg">
  <style>
    :root {
      --bg: #050506;
      --panel: #0c0d0f;
      --text: #f7f3ee;
      --muted: rgba(247, 243, 238, .68);
      --quiet: rgba(247, 243, 238, .42);
      --line: rgba(247, 243, 238, .14);
      --accent: #b05caf;
      --side: clamp(24px, 7vw, 96px);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", Meiryo, monospace;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      padding: clamp(28px, 6vw, 72px) var(--side);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ::selection {
      background: rgba(176, 92, 175, .34);
      color: var(--text);
    }

    .page {
      width: min(100%, 48rem);
      min-height: calc(100svh - clamp(28px, 6vw, 72px) * 2);
      margin: 0 auto;
      display: grid;
      align-content: center;
    }

    .hero {
      align-self: center;
      display: grid;
    }

    .terminal {
      display: grid;
      gap: clamp(26px, 4.2vw, 40px);
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      padding: clamp(20px, 4.2vw, 36px);
      box-shadow: inset 0 1px 0 rgba(247, 243, 238, .06);
    }

    .terminal-line {
      width: min(100%, 39rem);
      margin-inline: auto;
      min-width: 0;
      color: var(--muted);
      font-size: clamp(.82rem, 1.4vw, .95rem);
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prompt {
      color: var(--accent);
    }

    .terminal-content {
      display: grid;
      gap: clamp(26px, 4.2vw, 40px);
      width: min(100%, 39rem);
      margin-inline: auto;
    }

    .intro {
      display: grid;
      gap: 18px;
    }

    .title,
    .copy {
      margin: 0;
    }

    .title {
      display: flex;
      align-items: center;
      gap: .24em;
      color: var(--text);
      font-size: clamp(3.8rem, 11vw, 6rem);
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0;
    }

    .title-logo {
      width: 1.14em;
      height: 1.14em;
      flex: 0 0 auto;
      display: block;
    }

    .copy {
      max-width: 32rem;
      color: var(--muted);
      font-size: clamp(.96rem, 1.8vw, 1.12rem);
      line-height: 1.85;
      font-weight: 400;
    }

    .links {
      display: grid;
      border-top: 1px solid var(--line);
      max-width: 35rem;
    }

    .links a {
      display: grid;
      grid-template-columns: 1.2rem minmax(7rem, .42fr) 1fr;
      align-items: center;
      gap: 16px;
      min-height: 54px;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      transition: border-color .18s ease, color .18s ease, background-color .18s ease;
    }

    .links a::before {
      content: ">";
      color: var(--accent);
      font-size: .86rem;
      line-height: 1;
    }

    .link-name {
      font-size: .92rem;
      line-height: 1;
      font-weight: 400;
    }

    .link-note {
      color: var(--quiet);
      font-size: .78rem;
      line-height: 1.5;
    }

    .links a:hover,
    .links a:focus-visible {
      background: rgba(247, 243, 238, .025);
      border-bottom-color: rgba(176, 92, 175, .72);
      color: #fff;
      outline: none;
    }

    @media (max-width: 640px) {
      body {
        padding-block: 28px;
      }

      .page {
        min-height: calc(100svh - 56px);
      }

      .title {
        font-size: clamp(2.85rem, 16vw, 3.8rem);
      }

      .terminal {
        padding: 18px;
      }

      .links {
        max-width: none;
      }

      .links a {
        grid-template-columns: 1.2rem 1fr;
        gap: 8px 16px;
        padding: 16px 0;
      }

      .link-note {
        grid-column: 2 / -1;
        max-width: 18rem;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-labelledby="page-title">
    <section class="hero" aria-label="ABST overview">
      <div class="terminal">
        <div class="terminal-line">
          <span class="prompt">abst@im:~$</span> ./about
        </div>

        <div class="terminal-content">
          <div class="intro">
            <h1 id="page-title" class="title">
              <img class="title-logo" src="abst.svg" alt="" width="600" height="600">
              <span>ABST</span>
            </h1>
            <p class="copy">
              仮想空間をもっと楽しく。<br>
              ソフトウェアや3Dモデルなど、仮想空間に関わるものを作っています。
            </p>
          </div>

          <nav class="links" aria-label="Links">
            <a href="https://here.abst.im/" target="_blank" rel="noopener">
              <span class="link-name">Here!</span>
              <span class="link-note">日常にある仮想世界</span>
            </a>
            <a href="https://abst.booth.pm/" target="_blank" rel="noopener">
              <span class="link-name">BOOTH</span>
              <span class="link-note">ABSTのショップ</span>
            </a>
            <a href="https://vrchat.com/home/user/usr_6a8a6fe9-287f-4af5-b6a1-4c33c30c7c2b" target="_blank" rel="noopener">
              <span class="link-name">VRChat</span>
              <span class="link-note">坂本クリス</span>
            </a>
            <a href="https://x.com/KurisuSakamoto" target="_blank" rel="noopener">
              <span class="link-name">X</span>
              <span class="link-note">@KurisuSakamoto</span>
            </a>
            <a href="mailto:contact@abst.im">
              <span class="link-name">Contact</span>
              <span class="link-note">contact@abst.im</span>
            </a>
          </nav>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
